<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register – CMS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body class="auth-page">

<div class="cms-form-wrapper fade-up">

  <div class="auth-logo">⬡ ConferenceMS</div>
  <p class="auth-tagline">Create your account</p>

  <!-- Flash messages -->
  <div th:if="${error}" class="alert-cms alert-error-cms mb-3" th:text="${error}"></div>
  <div th:if="${success}" class="alert-cms alert-success-cms mb-3" th:text="${success}"></div>

  <form th:action="@{/register}" method="post">

    <div class="mb-3">
      <label class="form-label">Full Name</label>
      <input type="text" name="name" class="form-control" placeholder="Jane Doe" required autofocus/>
    </div>

    <div class="mb-3">
      <label class="form-label">Email Address</label>
      <input type="email" name="email" class="form-control" placeholder="you@example.com" required/>
    </div>

    <div class="mb-3">
      <label class="form-label">Password</label>
      <input type="password" name="password" class="form-control" placeholder="Min. 6 characters" required minlength="6"/>
    </div>

    <div class="mb-4">
      <label class="form-label">Register as</label>
      <select name="role" class="form-select">
        <option value="USER">User (Attendee / Author)</option>
        <option value="ORGANIZER">Organizer</option>
      </select>
      <div class="form-text" style="color: var(--text-muted); font-size:0.8rem; margin-top:0.35rem;">
        Admin accounts are assigned by existing administrators.
      </div>
    </div>

    <button type="submit" class="btn-primary w-100 py-2 rounded-2 fs-6">Create Account</button>
  </form>

  <p class="text-center mt-3" style="color: var(--text-muted); font-size:0.9rem;">
    Already have an account?
    <a th:href="@{/login}" style="color: var(--teal);">Sign in</a>
  </p>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/script.js}"></script>
</body>
</html>
