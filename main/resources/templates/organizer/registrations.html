<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Registrations – CMS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar(${user})}"></div>

<div class="page-wrapper">
  <div class="container">

    <!-- Breadcrumb -->
    <nav class="mb-3 fade-up" style="color: var(--text-muted); font-size:0.88rem;">
      <a th:href="@{/dashboard}" style="color: var(--teal);">
        <i class="fa-solid fa-arrow-left me-1"></i>Dashboard
      </a>
    </nav>

    <div class="section-header fade-up">
      <h1>Registrations</h1>
      <p>
        <span th:text="${registrations.size()}">0</span> attendee(s) registered for
        <strong th:text="${conference.title}">Conference</strong>
      </p>
    </div>

    <!-- Registrations Table -->
    <div class="cms-card fade-up fade-up-1" th:if="${registrations != null and !registrations.isEmpty()}">
      <table class="cms-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Attendee Name</th>
            <th>Email</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="reg, stat : ${registrations}">
            <td style="color: var(--text-muted);" th:text="${stat.count}">1</td>
            <td th:text="${reg.user.name}">Name</td>
            <td style="color: var(--text-muted);" th:text="${reg.user.email}">email@example.com</td>
            <td>
              <span th:class="'badge-status badge-' + ${reg.status.name().toLowerCase()}"
                    th:text="${reg.status.name()}">CONFIRMED</span>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="empty-state fade-up" th:if="${registrations == null or registrations.isEmpty()}">
      <div class="empty-icon">👥</div>
      <h3>No registrations yet</h3>
      <p>Nobody has registered for this conference yet.</p>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/script.js}"></script>
</body>
</html>
