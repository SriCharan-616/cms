<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Registrations – CMS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar(${user})}"></div>

<div class="page-wrapper">
  <div class="container">

    <!-- Flash messages -->
    <div th:if="${success}" class="alert-cms alert-success-cms mb-4 fade-up" th:text="${success}"></div>
    <div th:if="${error}"   class="alert-cms alert-error-cms   mb-4 fade-up" th:text="${error}"></div>

    <div class="section-header fade-up">
      <h1>My Registrations</h1>
      <p>All conferences you have registered for.</p>
    </div>

    <!-- Registrations Table -->
    <div class="cms-card fade-up fade-up-1" th:if="${registrations != null and !registrations.isEmpty()}">
      <table class="cms-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Conference</th>
            <th>Date</th>
            <th>Location</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="reg, stat : ${registrations}">
            <td style="color: var(--text-muted);" th:text="${stat.count}">1</td>
            <td>
              <a th:href="@{'/conferences/' + ${reg.conference.id}}"
                 th:text="${reg.conference.title}"
                 style="color: var(--teal); font-weight:500;">Title</a>
            </td>
            <td th:text="${#temporals.format(reg.conference.date, 'dd MMM yyyy')}"
                style="color: var(--text-muted);">Date</td>
            <td th:text="${reg.conference.location}"
                style="color: var(--text-muted);">Location</td>
            <td>
              <span th:class="'badge-status badge-' + ${reg.status.name().toLowerCase()}"
                    th:text="${reg.status.name()}">CONFIRMED</span>
            </td>
            <td>
              <form th:action="@{'/registrations/' + ${reg.id} + '/cancel'}" method="post" style="display:inline;">
                <button type="submit" class="btn-danger-cms btn-sm-cms"
                        data-confirm="Cancel this registration?">
                  <i class="fa-solid fa-xmark me-1"></i>Cancel
                </button>
              </form>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Empty state -->
    <div class="empty-state fade-up" th:if="${registrations == null or registrations.isEmpty()}">
      <div class="empty-icon">🎟️</div>
      <h3>No registrations yet</h3>
      <p>Browse conferences and register to attend!</p>
      <a th:href="@{/conferences}" class="btn-primary px-4 py-2 rounded-2 d-inline-block mt-2">
        <i class="fa-solid fa-calendar-days me-1"></i>Browse Conferences
      </a>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/script.js}"></script>
</body>
</html>
