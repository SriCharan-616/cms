<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Panel – CMS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar(${user})}"></div>

<div class="page-wrapper">
  <div class="container">

    <div class="section-header fade-up">
      <h1>Admin Panel</h1>
      <p>System overview and management.</p>
    </div>

    <!-- Stats Row -->
    <div class="row g-3 mb-4">
      <div class="col-6 col-md-3 fade-up fade-up-1">
        <div class="stat-card">
          <div class="stat-icon">👥</div>
          <div class="stat-number" th:text="${totalUsers}">0</div>
          <div class="stat-label">Total Users</div>
        </div>
      </div>
      <div class="col-6 col-md-3 fade-up fade-up-2">
        <div class="stat-card">
          <div class="stat-icon">🏛️</div>
          <div class="stat-number" th:text="${totalConferences}">0</div>
          <div class="stat-label">Conferences</div>
        </div>
      </div>
    </div>

    <!-- Quick Links -->
    <div class="cms-card mb-4 fade-up fade-up-3">
      <h3 class="mb-3" style="font-size:0.9rem; text-transform:uppercase; letter-spacing:0.06em; color:var(--text-muted);">
        Management
      </h3>
      <div class="d-flex flex-wrap gap-3">
        <a th:href="@{/admin/users}" class="btn-primary px-4 py-2 rounded-2">
          <i class="fa-solid fa-users me-1"></i>Manage Users
        </a>
        <a th:href="@{/admin/conferences}" class="btn-outline-cms px-4 py-2">
          <i class="fa-solid fa-calendar-days me-1"></i>Manage Conferences
        </a>
        <a th:href="@{/organizer/conferences/new}" class="btn-outline-cms px-4 py-2">
          <i class="fa-solid fa-plus me-1"></i>New Conference
        </a>
      </div>
    </div>

    <!-- Recent Users Preview -->
    <div class="cms-card fade-up fade-up-4">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h3>Recent Users</h3>
        <a th:href="@{/admin/users}" class="btn-outline-cms btn-sm-cms">View All</a>
      </div>
      <table class="cms-table">
        <thead>
          <tr><th>Name</th><th>Email</th><th>Role</th></tr>
        </thead>
        <tbody>
          <tr th:each="u : ${#lists.size(users) > 5 ? users.subList(0, 5) : users}">
            <td th:text="${u.name}">Name</td>
            <td style="color:var(--text-muted);" th:text="${u.email}">email</td>
            <td>
              <span th:class="'badge-status badge-' + ${u.role.name().toLowerCase()}"
                    th:text="${u.role.name()}">ROLE</span>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/script.js}"></script>
</body>
</html>
