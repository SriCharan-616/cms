<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Conferences – CMS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar(${user})}"></div>

<div class="page-wrapper">
  <div class="container">

    <!-- Header -->
    <div class="section-header fade-up d-flex justify-content-between align-items-start flex-wrap gap-3">
      <div>
        <h1>Conferences</h1>
        <p>Browse and register for upcoming events.</p>
      </div>
      <a th:if="${user.role.name() == 'ORGANIZER' or user.role.name() == 'ADMIN'}"
         th:href="@{/organizer/conferences/new}"
         class="btn-primary px-4 py-2 rounded-2">
        <i class="fa-solid fa-plus me-1"></i>New Conference
      </a>
    </div>

    <!-- Search Bar -->
    <div class="cms-card mb-4 fade-up fade-up-1" style="padding: 1.25rem 1.5rem;">
      <form th:action="@{/conferences}" method="get">
        <div class="search-bar">
          <i class="fa-solid fa-magnifying-glass search-icon"></i>
          <input type="text"
                 id="searchInput"
                 name="search"
                 class="form-control"
                 placeholder="Search by title, location, or keyword..."
                 th:value="${search}"/>
        </div>
      </form>
    </div>

    <!-- Results info -->
    <div class="mb-3 fade-up fade-up-2" style="color: var(--text-muted); font-size: 0.88rem;"
         th:if="${conferences != null}">
      <span th:text="${conferences.size()}">0</span> conference(s) found
      <span th:if="${search != null and !search.isBlank()}">
        for "<strong th:text="${search}" style="color: var(--teal);"></strong>"
      </span>
    </div>

    <!-- Conference Grid -->
    <div class="row g-3" th:if="${conferences != null and !conferences.isEmpty()}">
      <div class="col-md-6 col-lg-4 fade-up"
           th:each="conf, stat : ${conferences}"
           th:style="'animation-delay:' + ${stat.index * 0.07} + 's'">
        <div class="cms-card h-100 d-flex flex-column">

          <div class="card-title" th:text="${conf.title}">Conference Title</div>

          <div class="card-meta mt-1">
            <i class="fa-regular fa-calendar"></i>
            <span th:text="${#temporals.format(conf.date, 'dd MMM yyyy')}">Date</span>
          </div>
          <div class="card-meta">
            <i class="fa-solid fa-location-dot"></i>
            <span th:text="${conf.location}">Location</span>
          </div>
          <div class="card-meta">
            <i class="fa-regular fa-user"></i>
            <span th:text="'Organized by: ' + ${conf.createdBy.name}">Organizer</span>
          </div>

          <div class="mt-2 mb-3">
            <span th:if="${conf.fee != null and conf.fee.doubleValue() > 0}"
                  class="conference-fee"
                  th:text="'₹' + ${conf.fee}">Fee</span>
            <span th:if="${conf.fee == null or conf.fee.doubleValue() == 0}"
                  class="badge-status badge-approved">Free</span>
          </div>

          <p style="color: var(--text-muted); font-size:0.88rem; flex-grow:1;"
             th:text="${#strings.abbreviate(conf.description, 100)}">Description</p>

          <div class="mt-3">
            <a th:href="@{'/conferences/' + ${conf.id}}" class="btn-outline-cms w-100 text-center d-block">
              View Details <i class="fa-solid fa-arrow-right ms-1"></i>
            </a>
          </div>
        </div>
      </div>
    </div>

    <!-- Empty State -->
    <div class="empty-state fade-up" th:if="${conferences == null or conferences.isEmpty()}">
      <div class="empty-icon">🔍</div>
      <h3>No conferences found</h3>
      <p th:if="${search != null and !search.isBlank()}">
        Try a different search term.
      </p>
      <p th:if="${search == null or search.isBlank()}">
        No conferences have been added yet.
      </p>
      <a th:href="@{/conferences}" class="btn-outline-cms d-inline-block mt-2">Clear Search</a>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/script.js}"></script>
</body>
</html>
