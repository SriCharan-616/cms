<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="${conference != null ? 'Edit Conference' : 'New Conference'} + ' – CMS'">Conference Form</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar(${user})}"></div>

<div class="page-wrapper">
  <div class="container">

    <!-- Breadcrumb -->
    <nav class="mb-3 fade-up" style="color: var(--text-muted); font-size:0.88rem;">
      <a th:href="@{/dashboard}" style="color: var(--teal);">
        <i class="fa-solid fa-arrow-left me-1"></i>Dashboard
      </a>
    </nav>

    <div class="section-header fade-up">
      <h1 th:text="${conference != null ? 'Edit Conference' : 'Create Conference'}">Conference Form</h1>
      <p th:text="${conference != null ? 'Update conference details.' : 'Fill in the details to create a new conference.'}">Subtitle</p>
    </div>

    <!-- Flash messages -->
    <div th:if="${error}" class="alert-cms alert-error-cms mb-4 fade-up" th:text="${error}"></div>

    <div class="cms-form-wrapper wide fade-up fade-up-1">

      <!-- Edit Form -->
      <form th:if="${conference != null}"
            th:action="@{'/organizer/conferences/' + ${conference.id} + '/edit'}"
            method="post">

        <div class="mb-3">
          <label class="form-label">Conference Title</label>
          <input type="text" name="title" class="form-control"
                 th:value="${conference.title}"
                 placeholder="e.g. International AI Summit 2025" required/>
        </div>

        <div class="mb-3">
          <label class="form-label">Description</label>
          <textarea name="description" class="form-control" rows="4"
                    placeholder="Describe the conference, its goals, themes, and target audience..."
                    th:text="${conference.description}"></textarea>
        </div>

        <div class="row g-3 mb-3">
          <div class="col-md-6">
            <label class="form-label">Date</label>
            <input type="date" name="date" class="form-control"
                   th:value="${conference.date}" required/>
          </div>
          <div class="col-md-6">
            <label class="form-label">Registration Fee (₹)</label>
            <input type="number" name="fee" class="form-control" min="0" step="0.01"
                   th:value="${conference.fee}" placeholder="0 for free"/>
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label">Location</label>
          <input type="text" name="location" class="form-control"
                 th:value="${conference.location}"
                 placeholder="e.g. Chennai Trade Centre, Tamil Nadu" required/>
        </div>

        <div class="d-flex gap-3">
          <button type="submit" class="btn-primary px-4 py-2 rounded-2">
            <i class="fa-solid fa-floppy-disk me-1"></i>Save Changes
          </button>
          <a th:href="@{/dashboard}" class="btn-outline-cms px-4 py-2">Cancel</a>
        </div>
      </form>

      <!-- Create Form -->
      <form th:if="${conference == null}"
            th:action="@{/organizer/conferences/new}"
            method="post">

        <div class="mb-3">
          <label class="form-label">Conference Title</label>
          <input type="text" name="title" class="form-control"
                 placeholder="e.g. International AI Summit 2025" required autofocus/>
        </div>

        <div class="mb-3">
          <label class="form-label">Description</label>
          <textarea name="description" class="form-control" rows="4"
                    placeholder="Describe the conference, its goals, themes, and target audience..."></textarea>
        </div>

        <div class="row g-3 mb-3">
          <div class="col-md-6">
            <label class="form-label">Date</label>
            <input type="date" name="date" class="form-control" required/>
          </div>
          <div class="col-md-6">
            <label class="form-label">Registration Fee (₹)</label>
            <input type="number" name="fee" class="form-control" min="0" step="0.01"
                   value="0" placeholder="0 for free"/>
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label">Location</label>
          <input type="text" name="location" class="form-control"
                 placeholder="e.g. Chennai Trade Centre, Tamil Nadu" required/>
        </div>

        <div class="d-flex gap-3">
          <button type="submit" class="btn-primary px-4 py-2 rounded-2">
            <i class="fa-solid fa-plus me-1"></i>Create Conference
          </button>
          <a th:href="@{/dashboard}" class="btn-outline-cms px-4 py-2">Cancel</a>
        </div>
      </form>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/script.js}"></script>
</body>
</html>
