<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manage Users – CMS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar(${user})}"></div>

<div class="page-wrapper">
  <div class="container">

    <!-- Breadcrumb -->
    <nav class="mb-3 fade-up" style="color: var(--text-muted); font-size:0.88rem;">
      <a th:href="@{/admin}" style="color: var(--teal);">
        <i class="fa-solid fa-arrow-left me-1"></i>Admin Panel
      </a>
    </nav>

    <!-- Flash -->
    <div th:if="${success}" class="alert-cms alert-success-cms mb-3 fade-up" th:text="${success}"></div>
    <div th:if="${error}"   class="alert-cms alert-error-cms   mb-3 fade-up" th:text="${error}"></div>

    <div class="section-header fade-up">
      <h1>Manage Users</h1>
      <p><span th:text="${users.size()}">0</span> registered users in the system.</p>
    </div>

    <div class="cms-card fade-up fade-up-1">
      <table class="cms-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Current Role</th>
            <th>Change Role</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="u : ${users}">
            <td style="color:var(--text-muted); font-size:0.8rem;" th:text="${u.id}">1</td>
            <td style="font-weight:500;" th:text="${u.name}">Name</td>
            <td style="color:var(--text-muted); font-size:0.88rem;" th:text="${u.email}">email</td>
            <td>
              <span th:class="'badge-status badge-' + ${u.role.name().toLowerCase()}"
                    th:text="${u.role.name()}">ROLE</span>
            </td>
            <td>
              <form th:action="@{'/admin/users/' + ${u.id} + '/role'}" method="post"
                    class="d-flex gap-2 align-items-center">
                <select name="role" class="form-select" style="max-width:140px; padding: 0.3rem 0.6rem !important; font-size:0.85rem !important;">
                  <option th:each="r : ${roles}"
                          th:value="${r.name()}"
                          th:text="${r.name()}"
                          th:selected="${r == u.role}">ROLE</option>
                </select>
                <button type="submit" class="btn-outline-cms btn-sm-cms">
                  <i class="fa-solid fa-check"></i>
                </button>
              </form>
            </td>
            <td>
              <form th:action="@{'/admin/users/' + ${u.id} + '/delete'}" method="post" style="display:inline;">
                <button type="submit" class="btn-danger-cms btn-sm-cms"
                        data-confirm="Delete this user permanently?">
                  <i class="fa-solid fa-trash"></i>
                </button>
              </form>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/script.js}"></script>
</body>
</html>
