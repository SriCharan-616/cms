<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manage Conferences – CMS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar(${user})}"></div>

<div class="page-wrapper">
  <div class="container">

    <!-- Breadcrumb -->
    <nav class="mb-3 fade-up" style="color: var(--text-muted); font-size:0.88rem;">
      <a th:href="@{/admin}" style="color: var(--teal);">
        <i class="fa-solid fa-arrow-left me-1"></i>Admin Panel
      </a>
    </nav>

    <!-- Flash -->
    <div th:if="${success}" class="alert-cms alert-success-cms mb-3 fade-up" th:text="${success}"></div>
    <div th:if="${error}"   class="alert-cms alert-error-cms   mb-3 fade-up" th:text="${error}"></div>

    <div class="section-header fade-up d-flex justify-content-between align-items-start flex-wrap gap-3">
      <div>
        <h1>Manage Conferences</h1>
        <p><span th:text="${conferences.size()}">0</span> conferences in the system.</p>
      </div>
      <a th:href="@{/organizer/conferences/new}" class="btn-primary px-4 py-2 rounded-2">
        <i class="fa-solid fa-plus me-1"></i>New Conference
      </a>
    </div>

    <div class="cms-card fade-up fade-up-1" th:if="${conferences != null and !conferences.isEmpty()}">
      <table class="cms-table">
        <thead>
          <tr>
            <th>Title</th>
            <th>Date</th>
            <th>Location</th>
            <th>Organizer</th>
            <th>Fee</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="conf : ${conferences}">
            <td>
              <a th:href="@{'/conferences/' + ${conf.id}}"
                 th:text="${conf.title}"
                 style="color: var(--teal); font-weight:500;">Title</a>
            </td>
            <td style="color:var(--text-muted);"
                th:text="${#temporals.format(conf.date, 'dd MMM yyyy')}">Date</td>
            <td style="color:var(--text-muted);" th:text="${conf.location}">Location</td>
            <td style="color:var(--text-muted);" th:text="${conf.createdBy.name}">Organizer</td>
            <td>
              <span th:if="${conf.fee != null and conf.fee.doubleValue() > 0}"
                    class="conference-fee" th:text="'₹' + ${conf.fee}">Fee</span>
              <span th:if="${conf.fee == null or conf.fee.doubleValue() == 0}"
                    class="badge-status badge-approved">Free</span>
            </td>
            <td>
              <div class="d-flex gap-1 flex-wrap">
                <a th:href="@{'/organizer/conferences/' + ${conf.id} + '/edit'}"
                   class="btn-outline-cms btn-sm-cms">
                  <i class="fa-solid fa-pen"></i>
                </a>
                <form th:action="@{'/admin/conferences/' + ${conf.id} + '/delete'}" method="post" style="display:inline;">
                  <button type="submit" class="btn-danger-cms btn-sm-cms"
                          data-confirm="Delete this conference?">
                    <i class="fa-solid fa-trash"></i>
                  </button>
                </form>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="empty-state fade-up" th:if="${conferences == null or conferences.isEmpty()}">
      <div class="empty-icon">🏛️</div>
      <h3>No conferences yet</h3>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/script.js}"></script>
</body>
</html>
