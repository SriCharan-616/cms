<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Submit Paper – CMS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar(${user})}"></div>

<div class="page-wrapper">
  <div class="container">

    <div class="section-header fade-up">
      <h1>Submit a Paper</h1>
      <p>Share your research with the conference community.</p>
    </div>

    <!-- Flash messages -->
    <div th:if="${error}" class="alert-cms alert-error-cms mb-4 fade-up" th:text="${error}"></div>

    <div class="cms-form-wrapper wide fade-up fade-up-1">

      <form th:action="@{/submit-paper}" method="post" enctype="multipart/form-data">

        <div class="mb-3">
          <label class="form-label">Paper Title</label>
          <input type="text" name="title" class="form-control"
                 placeholder="e.g. Deep Learning in Climate Science" required/>
        </div>

        <div class="mb-3">
          <label class="form-label">Conference</label>
          <select name="conferenceId" class="form-select" required>
            <option value="" disabled selected>Select a conference...</option>
            <option th:each="conf : ${conferences}"
                    th:value="${conf.id}"
                    th:text="${conf.title + ' (' + conf.date + ')'}">Conference</option>
          </select>
          <div class="form-text" style="color: var(--text-muted); font-size:0.8rem; margin-top:0.35rem;">
            You should be registered for the conference before submitting.
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Abstract</label>
          <textarea name="abstrakt" class="form-control" rows="5"
                    placeholder="Provide a brief summary of your paper (200–500 words recommended)..."></textarea>
        </div>

        <div class="mb-4">
          <label class="form-label">Upload PDF</label>
          <div style="border: 1.5px dashed var(--border); border-radius: 10px; padding: 1.5rem; text-align: center; cursor: pointer;"
               onclick="document.getElementById('fileInput').click()">
            <i class="fa-solid fa-cloud-arrow-up" style="font-size:2rem; color: var(--teal); margin-bottom:0.5rem; display:block;"></i>
            <div id="fileLabel" style="color: var(--text-muted); font-size:0.9rem;">
              Click to choose a PDF file (max 10 MB)
            </div>
          </div>
          <input type="file" id="fileInput" name="file" accept="application/pdf"
                 style="display:none;"/>
        </div>

        <button type="submit" class="btn-primary w-100 py-2 rounded-2 fs-6">
          <i class="fa-solid fa-paper-plane me-2"></i>Submit Paper
        </button>

      </form>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/script.js}"></script>
</body>
</html>
